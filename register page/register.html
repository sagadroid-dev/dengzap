<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="register-container.css">
    <script src="./register.js"></script>
</head>
<body>
    <div class="register-container">
        <div class="company-logo"></div>

        <div class="register-content">
            <div class="input-father">
                
                <label for="name-input">Nome de Usuário</label>
                <div class="input-box">
                <input type="text" class="name-input" placeholder="Digite seu nome">
                </div>
                <label for="email-input">Email</label>
                <div class="input-box">
                <input type="email" class="email-input" placeholder="johndoe@email.com">
                </div>
                <label for="password-input">Senha</label>
                <div class="input-box">
                <input type="password" class="password-input" placeholder="Digite a senha">
                </div>
                <label for="confirm-password-input">Confirme sua senha</label>
                <div class="input-box">
                <input type="password" class="confirm-password-input" placeholder="Digite novamente">
                </div>
            </div>
            <div class="terms">
                <input type="checkbox" class="checkbox-input"> 
                <label for="checkbox-input">Li e aceito os termos de uso</label>
            </div>
            <div class="button-father">
                <button type="button" class="submit-button"> Enviar </button>
            </div>
        </div>
    </div>
    
    

</body>
</html>

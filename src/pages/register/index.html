<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DengZap - Cadastro</title>

    <link rel="stylesheet" href="register-container.css">
    <script type="module" src="register.js" defer></script>
</head>
<body>

<div class="register-container">

    <div class="company-logo"></div>

    <div class="register-content">

        <div class="input-father">

            <label for="username">Nome de Usuário</label>

            <div class="input-box">
                <input
                    id="username"
                    class="name-input"
                    type="text"
                    placeholder="Digite seu nome">
            </div>

            <label for="email">Email</label>

            <div class="input-box">
                <input
                    id="email"
                    class="email-input"
                    type="email"
                    placeholder="johndoe@email.com">
            </div>

            <label for="password">Senha</label>

            <div class="input-box">

                <input
                    id="password"
                    class="password-input"
                    type="password"
                    placeholder="Digite sua senha">

                <button
                    type="button"
                    class="toggle-password"
                    data-target="password">

                    👁

                </button>

            </div>

            <label for="confirm-password">Confirmar senha</label>

            <div class="input-box">

                <input
                    id="confirm-password"
                    class="confirm-password-input"
                    type="password"
                    placeholder="Digite novamente">

                <button
                    type="button"
                    class="toggle-password"
                    data-target="confirm-password">

                    👁

                </button>

            </div>

        </div>

        <div class="terms">

            <input
                id="terms"
                type="checkbox"
                class="checkbox-input">

            <label for="terms">
                Li e aceito os termos de uso
            </label>

        </div>

        <div class="button-father">

            <button
                type="button"
                class="submit-button">

                Enviar

            </button>

        </div>

        <p class="login-link">

            Já possui uma conta?

            <a href="../login/index.html">

                Fazer login

            </a>

        </p>

    </div>

</div>

</body>
</html>
